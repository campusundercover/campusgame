version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: campus_undercover_db
    restart: always
    environment:
      POSTGRES_USER: campus_admin
      POSTGRES_PASSWORD: secret_password_123
      POSTGRES_DB: campus_undercover
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: campus_undercover_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DATABASE_URL=postgresql://campus_admin:secret_password_123@db:5432/campus_undercover
      - SECRET_KEY=supersecretkeythatisverylongandrandom12345!
      - ENVIRONMENT=development
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: campus_undercover_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:

